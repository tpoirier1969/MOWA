<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Help Shape MOWA’s Next Chapter</title>
  <meta name="description" content="MOWA member and board direction questionnaire." />
  <link rel="stylesheet" href="css/app.css?v=20260713-4" />
  <link rel="stylesheet" href="css/mobile-fix.css?v=20260713-4" />
  <link rel="stylesheet" href="css/visual-theme.css?v=20260713-4" />
</head>
<body class="survey-app">
  <header class="app-header">
    <button class="brand-button" type="button" id="homeLink" aria-label="Return to the first page">
      <img src="assets/mowa-logo.webp" alt="Michigan Outdoor Writers Association" />
    </button>
    <div class="header-actions">
      <a class="bylaws-link" href="docs/mowa-bylaws-revised-2026.pdf" target="_blank" rel="noopener noreferrer">Bylaws <span aria-hidden="true">↗</span></a>
      <div class="autosave-status" id="saveStatus" aria-live="polite">
        Your answers are automatically saved on this computer.
      </div>
    </div>
  </header>

  <main class="app-main">
    <div class="section-progress" id="sectionProgress" hidden>
      <div class="section-tabs" id="sectionTabs" aria-label="Questionnaire sections"></div>
      <div class="progress-line" aria-hidden="true"><span id="progressBar"></span></div>
    </div>

    <div class="screen-host" id="screenHost" aria-live="polite"></div>
  </main>

  <dialog id="messageDialog" class="message-dialog">
    <div id="dialogContent"></div>
    <button type="button" class="button primary" id="closeDialog">Close</button>
  </dialog>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
