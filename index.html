<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Help Shape MOWA’s Next Chapter</title>
  <meta name="description" content="MOWA member and board direction questionnaire." />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="survey-app">
  <header class="app-header">
    <a class="brand" href="#" id="homeLink" aria-label="Return to the first page">
      <img src="assets/mowa-logo.webp" alt="Michigan Outdoor Writers Association" />
    </a>
    <div class="header-meta">
      <span id="saveStatus">Answers save in this browser</span>
      <button type="button" class="text-button" id="saveDraft">Save</button>
      <button type="button" class="text-button" id="exportDraft">Export</button>
    </div>
  </header>

  <main class="app-main" aria-live="polite">
    <div class="section-progress" id="sectionProgress" hidden>
      <div class="section-tabs" id="sectionTabs" aria-label="Questionnaire sections"></div>
      <div class="progress-line" aria-hidden="true"><span id="progressBar"></span></div>
    </div>

    <div class="screen-host" id="screenHost"></div>
  </main>

  <footer class="app-footer">
    <div class="footer-left">
      <span id="pageCount">Page 1</span>
      <span class="footer-divider" aria-hidden="true">•</span>
      <span id="progressText">Introduction</span>
    </div>
    <div class="footer-actions" id="footerActions"></div>
  </footer>

  <dialog id="messageDialog" class="message-dialog">
    <div id="dialogContent"></div>
    <button type="button" class="button primary" id="closeDialog">Close</button>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
